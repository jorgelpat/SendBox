<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SendBox - Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container">
        <form id="login-form" class="login-box">

            <h1 class="login-title">SendBox</h1>
            <p class="login-subtitle">Iniciar Sesión</p>

            <div class="input-group">
                <input 
                    type="text" 
                    id="usuario" 
                    placeholder="Usuario"
                    required
                >
            </div>

            <div class="input-group">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Contraseña"
                    required
                >
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>

            <p class="login-hint">
                Usuario de prueba:
                <br>
                oficina / mensajero
            </p>

        </form>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
